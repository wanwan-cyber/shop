<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF3EB">
<title>萬萬精選 WANWAN SELECTED</title>
<style>
:root {
  --cream: #FAF3EB;
  --cream-2: #F5EBDD;
  --cream-3: #FFFDFA;
  --apricot: #E8B587;
  --apricot-deep: #D49768;
  --apricot-soft: #F2D5B5;
  --wood: #8B6F47;
  --wood-soft: #A68968;
  --text: #4A3F35;
  --text-soft: #7C6E5F;
  --text-mute: #A9998A;
  --border: rgba(139, 111, 71, 0.15);
  --border-strong: rgba(139, 111, 71, 0.28);
  --shadow-sm: 0 1px 4px rgba(139, 111, 71, 0.06);
  --shadow: 0 2px 12px rgba(139, 111, 71, 0.08);
  --shadow-lg: 0 8px 32px rgba(139, 111, 71, 0.12);
  --gold: #C9A84C;
  --sold: #C88770;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== HEADER ===== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 253, 250, 0.92);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  line-height: 1.15;
  flex-shrink: 0;
  min-width: 0;
}

.brand-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 1.4px;
  font-family: "Georgia", "Times New Roman", -apple-system, serif;
  white-space: nowrap;
}

.brand-addr {
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.3px;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-box {
  flex: 1;
  position: relative;
  max-width: 480px;
}

.search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: all .2s;
}

.search-input:focus {
  outline: none;
  border-color: var(--apricot);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(232, 181, 135, 0.15);
}

.search-input::placeholder { color: var(--text-mute); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--wood-soft);
  font-size: 14px;
  pointer-events: none;
}

.cart-btn {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--wood);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}

.cart-btn:hover, .cart-btn:active { background: var(--apricot-soft); transform: scale(1.05); }

.cart-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  background: var(--apricot-deep);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--cream-3);
}

.cart-badge:empty, .cart-badge[data-count="0"] { display: none; }

/* ===== DEMO BANNER ===== */
.demo-banner {
  background: linear-gradient(135deg, rgba(232, 181, 135, 0.15), rgba(201, 168, 76, 0.1));
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  text-align: center;
  font-size: 11px;
  color: var(--wood);
  letter-spacing: 0.5px;
}

.demo-banner strong { color: var(--apricot-deep); }

/* ===== CATEGORY BAR ===== */
.cat-bar-wrap {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 65px;
  z-index: 90;
  backdrop-filter: blur(8px);
  background: rgba(250, 243, 235, 0.9);
}

.cat-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.cat-bar::-webkit-scrollbar { display: none; }

.cat-chip {
  padding: 7px 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  font-family: inherit;
}

.cat-chip:hover { border-color: var(--apricot); color: var(--wood); }

.cat-chip.active {
  background: var(--wood);
  color: var(--cream);
  border-color: var(--wood);
  font-weight: 600;
}

/* ===== MAIN CONTENT ===== */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.result-count {
  font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.result-count strong { color: var(--wood); font-weight: 700; }

/* ===== PRODUCT GRID ===== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

@media (min-width: 640px) {
  .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
}

@media (min-width: 1024px) {
  .product-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
}

/* ===== PRODUCT CARD ===== */
.product-card {
  background: var(--cream-3);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-strong);
}

.product-card:active { transform: translateY(-1px); }

.card-image-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--cream-2);
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1);
  display: block;
}

.product-card:hover .card-image { transform: scale(1.06); }

.card-image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mute);
  font-size: 32px;
  background: linear-gradient(135deg, var(--cream-2), var(--apricot-soft));
}

/* SOLD OUT overlay */
.sold-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(200, 135, 112, 0.95);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 8px;
  letter-spacing: 1px;
  z-index: 2;
}

.product-card.sold-out .card-image { opacity: 0.55; filter: saturate(0.6); }

.card-body {
  padding: 12px 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.card-colors {
  display: flex;
  gap: 4px;
  align-items: center;
  min-height: 14px;
}

.color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(139, 111, 71, 0.2);
  display: inline-block;
}

.card-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}

.card-price {
  font-size: 16px;
  color: var(--wood);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.card-price .currency { font-size: 11px; margin-right: 1px; opacity: 0.7; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-mute);
}

.empty-state .icon { font-size: 44px; margin-bottom: 12px; opacity: 0.5; }

.empty-state h3 { color: var(--text-soft); font-size: 15px; font-weight: 600; margin-bottom: 6px; }

.empty-state p { font-size: 12px; }

/* ===== FOOTER ===== */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 30px 16px 40px;
  margin-top: 40px;
  background: var(--cream-3);
  text-align: center;
}

.footer-inner { max-width: 1280px; margin: 0 auto; }

.footer-brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.footer-tagline {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.footer-contact {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--wood);
  color: var(--cream);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all .2s;
}

.contact-btn:hover { background: var(--apricot-deep); transform: translateY(-1px); }

.footer-copy {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 1px;
}

/* ===== LOADING ===== */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-mute);
  font-size: 13px;
}

.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--apricot-deep);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--wood);
  color: var(--cream);
  padding: 10px 18px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  max-width: 90vw;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MOBILE TWEAKS ===== */
@media (max-width: 480px) {
  .brand-name { font-size: 17px; letter-spacing: 1px; }
  .brand-addr { font-size: 9.5px; margin-top: 2px; }
  .search-input { font-size: 13px; padding: 8px 12px 8px 32px; }
  .search-icon { left: 10px; font-size: 12px; }
  .cart-btn { width: 36px; height: 36px; font-size: 16px; }
  .cat-bar-wrap { top: 61px; }
}

@media (max-width: 380px) {
  .brand-name { font-size: 15px; }
  .brand-addr { font-size: 9px; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="header-inner">
    <div class="brand" onclick="clearAllFilters()" style="cursor:pointer;" title="回到首頁">
      <span class="brand-name">WanWan Selected</span>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜尋商品..." autocomplete="off">
    </div>
    <button class="cart-btn" onclick="openCart()" aria-label="購物車">
      🛒
      <span class="cart-badge" id="cartBadge" data-count="0"></span>
    </button>
  </div>
</header>

<!-- ===== DEMO BANNER (M2 期間顯示) ===== -->
<div class="demo-banner" id="demoBanner">
  <strong>⚠️ 展示模式</strong>：目前顯示範例商品，實際商品資料串接中
</div>

<!-- ===== CATEGORY BAR ===== -->
<div class="cat-bar-wrap">
  <div class="cat-bar" id="catBar">
    <!-- 由 JS 動態產生 -->
  </div>
</div>

<!-- ===== MAIN ===== -->
<main>
  <div class="result-count" id="resultCount"></div>
  <div id="productArea">
    <div class="loading">
      <div class="spinner"></div>
      <div>載入中...</div>
    </div>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">WanWan Selected</div>
    <div class="footer-tagline">精選女裝&nbsp;·&nbsp;新竹湖口</div>
    <div style="font-size:12px;color:var(--text-soft);margin-bottom:20px;letter-spacing:0.5px;">
      📍 新竹縣湖口鄉明德街210號
    </div>
    <div class="footer-contact">
      <a href="https://line.me/R/ti/p/@" class="contact-btn" target="_blank" rel="noopener">
        💬 LINE 客服
      </a>
      <a href="#" class="contact-btn" onclick="event.preventDefault();toast('IG 連結請告訴我，之後幫你設定 🙌')">
        📷 Instagram
      </a>
    </div>
    <div class="footer-copy">© 2026 WanWan Selected · Made with 💛</div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定：等 M2b 接 Apps Script 時把 URL 填進來
// ============================================================
const APPS_SCRIPT_URL = ''; // 例：'https://script.google.com/macros/s/xxxxx/exec'
const APPS_SCRIPT_ACTION = 'getShopProducts';

// ============================================================
// Cloudinary 圖片轉換：官網照片 1080p，列表用 400px 縮圖
// ============================================================
function toCloudinaryImage(url, width) {
  if (!url || typeof url !== 'string') return '';
  if (!url.includes('cloudinary.com')) return url;
  // 已經有 transformation 就不重複加
  if (url.match(/\/upload\/[a-z]_[^\/]+\//)) return url;
  return url.replace('/upload/', `/upload/w_${width},q_auto,f_auto/`);
}

function thumb(url) { return toCloudinaryImage(url, 400); }
function full(url) { return toCloudinaryImage(url, 1080); }

// ============================================================
// Mock 資料（開發用，接 Apps Script 後會替換）
// ============================================================
const MOCK_PRODUCTS = [
  { id:'m1', name:'法式碎花洋裝', cat:'洋裝', price:1280, images:[], colors:['#F5D5B0','#E8B587'], sizes:['S','M','L'], stock:5, onlineShop:true },
  { id:'m2', name:'奶油針織上衣', cat:'上衣', price:880, images:[], colors:['#FAF3EB','#D4C4A8'], sizes:['F'], stock:8, onlineShop:true },
  { id:'m3', name:'高腰寬管褲', cat:'褲子', price:1180, images:[], colors:['#4A3F35','#8B6F47'], sizes:['S','M','L'], stock:3, onlineShop:true },
  { id:'m4', name:'復古格紋短裙', cat:'裙子', price:980, images:[], colors:['#C88770','#7C6E5F'], sizes:['S','M'], stock:0, onlineShop:true },
  { id:'m5', name:'羊毛混紡外套', cat:'外套', price:2480, images:[], colors:['#A68968','#4A3F35'], sizes:['M','L'], stock:2, onlineShop:true },
  { id:'m6', name:'珍珠貝殼耳環', cat:'配件', price:380, images:[], colors:['#FAF3EB','#C9A84C'], sizes:['F'], stock:12, onlineShop:true },
  { id:'m7', name:'絲質雪紡襯衫', cat:'上衣', price:1080, images:[], colors:['#F2D5B5','#E8B587','#D49768'], sizes:['S','M','L'], stock:6, onlineShop:true },
  { id:'m8', name:'荷葉邊連身裙', cat:'洋裝', price:1580, images:[], colors:['#F5EBDD'], sizes:['S','M'], stock:0, onlineShop:true },
  { id:'m9', name:'棉麻寬鬆長褲', cat:'褲子', price:1180, images:[], colors:['#A9998A','#7C6E5F'], sizes:['M','L'], stock:4, onlineShop:true },
  { id:'m10', name:'簡約皮革腰帶', cat:'配件', price:580, images:[], colors:['#4A3F35','#8B6F47','#C9A84C'], sizes:['F'], stock:15, onlineShop:true },
  { id:'m11', name:'百褶中長裙', cat:'裙子', price:1280, images:[], colors:['#7C6E5F','#4A3F35'], sizes:['S','M','L'], stock:7, onlineShop:true },
  { id:'m12', name:'羊絨圓領毛衣', cat:'上衣', price:1680, images:[], colors:['#FAF3EB','#F5D5B0','#A68968'], sizes:['S','M','L'], stock:9, onlineShop:true },
];

// ============================================================
// State
// ============================================================
let allProducts = [];
let currentCat = '全部';
let currentSearch = '';
let cart = []; // 預留給 M3

// ============================================================
// 載入商品（先嘗試 Apps Script，失敗回退到 mock）
// ============================================================
async function loadProducts() {
  if (!APPS_SCRIPT_URL) {
    // 還沒接 Apps Script
    allProducts = MOCK_PRODUCTS;
    document.getElementById('demoBanner').style.display = 'block';
    render();
    return;
  }
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=${APPS_SCRIPT_ACTION}`);
    const data = await res.json();
    if (data && data.ok && Array.isArray(data.products)) {
      allProducts = data.products;
      document.getElementById('demoBanner').style.display = 'none';
      render();
    } else {
      throw new Error('回應格式錯誤');
    }
  } catch (err) {
    console.warn('無法載入商品，改用 mock 資料', err);
    allProducts = MOCK_PRODUCTS;
    document.getElementById('demoBanner').style.display = 'block';
    document.getElementById('demoBanner').innerHTML = '<strong>⚠️ 展示模式</strong>：無法連線到伺服器，顯示範例商品';
    render();
  }
}

// ============================================================
// 篩選 + 排序
// ============================================================
function getFilteredProducts() {
  let list = allProducts.slice();
  // 只顯示已上架
  list = list.filter(p => p.onlineShop === true);
  // 分類篩選
  if (currentCat && currentCat !== '全部') {
    list = list.filter(p => p.cat === currentCat);
  }
  // 搜尋
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(p => (p.name || '').toLowerCase().includes(q));
  }
  // 排序：有庫存優先、然後價格由低到高
  list.sort((a, b) => {
    const aOut = (a.stock || 0) <= 0 ? 1 : 0;
    const bOut = (b.stock || 0) <= 0 ? 1 : 0;
    if (aOut !== bOut) return aOut - bOut;
    return (a.price || 0) - (b.price || 0);
  });
  return list;
}

// ============================================================
// 分類 chip 產生
// ============================================================
function renderCatBar() {
  const cats = ['全部', ...new Set(allProducts.filter(p => p.onlineShop).map(p => p.cat).filter(Boolean))];
  const bar = document.getElementById('catBar');
  bar.innerHTML = cats.map(c =>
    `<button class="cat-chip ${c === currentCat ? 'active' : ''}" onclick="setCat('${c.replace(/'/g, "\\'")}')">${c}</button>`
  ).join('');
}

function setCat(cat) {
  currentCat = cat;
  render();
  // scroll 分類 chip 到中央（如果需要）
  const active = document.querySelector('.cat-chip.active');
  if (active && active.scrollIntoView) {
    active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// 商品卡片產生
// ============================================================
function renderProducts() {
  const list = getFilteredProducts();
  const area = document.getElementById('productArea');
  const count = document.getElementById('resultCount');

  if (list.length === 0) {
    count.innerHTML = '';
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h3>找不到符合條件的商品</h3>
        <p>${currentSearch ? `沒有「${escapeHtml(currentSearch)}」的搜尋結果` : '這個分類目前沒有商品'}</p>
      </div>`;
    return;
  }

  count.innerHTML = `共 <strong>${list.length}</strong> 件商品`;

  area.innerHTML = `<div class="product-grid">${list.map(p => cardHtml(p)).join('')}</div>`;
}

function cardHtml(p) {
  const soldOut = (p.stock || 0) <= 0;
  const img = (p.images && p.images[0]) || p.image || '';
  const imgHtml = img
    ? `<img class="card-image" src="${thumb(img)}" alt="${escapeAttr(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-image-placeholder\\'>👗</div>'">`
    : `<div class="card-image-placeholder">👗</div>`;
  const soldBadge = soldOut ? `<div class="sold-badge">SOLD OUT</div>` : '';
  const colorsHtml = (p.colors || []).slice(0, 5).map(c => {
    // 若 c 是 #xxxxxx 顏色碼，直接用；否則用文字色 fallback
    const isHex = /^#[0-9A-Fa-f]{3,8}$/.test(c);
    return `<span class="color-dot" style="background:${isHex ? c : 'var(--apricot-soft)'}" title="${escapeAttr(c)}"></span>`;
  }).join('');

  return `
    <article class="product-card ${soldOut ? 'sold-out' : ''}" onclick="openProduct('${p.id}')">
      <div class="card-image-wrap">${soldBadge}${imgHtml}</div>
      <div class="card-body">
        <div class="card-colors">${colorsHtml}</div>
        <div class="card-name">${escapeHtml(p.name || '未命名商品')}</div>
        <div class="card-price"><span class="currency">NT$</span>${(p.price || 0).toLocaleString()}</div>
      </div>
    </article>
  `;
}

// ============================================================
// 事件
// ============================================================
function openProduct(id) {
  toast('商品詳情頁即將推出（M3）');
  // M3 會實作
}

function openCart() {
  if (cart.length === 0) {
    toast('購物車功能即將推出（M3）');
  } else {
    toast(`購物車有 ${cart.length} 件商品`);
  }
}

function clearAllFilters() {
  currentCat = '全部';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// 工具
// ============================================================
function render() {
  renderCatBar();
  renderProducts();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// 搜尋（防抖）
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    renderProducts();
  }, 200);
});

// ============================================================
// 啟動
// ============================================================
loadProducts();
</script>
</body>
</html>
