<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF3EB">
<title> WANWAN SELECTED</title>
<style>
:root {
  --cream: #FAF3EB;
  --cream-2: #F5EBDD;
  --cream-3: #FFFDFA;
  --apricot: #E8B587;
  --apricot-deep: #D49768;
  --apricot-soft: #F2D5B5;
  --wood: #8B6F47;
  --wood-soft: #A68968;
  --text: #4A3F35;
  --text-soft: #7C6E5F;
  --text-mute: #A9998A;
  --border: rgba(139, 111, 71, 0.15);
  --border-strong: rgba(139, 111, 71, 0.28);
  --shadow-sm: 0 1px 4px rgba(139, 111, 71, 0.06);
  --shadow: 0 2px 12px rgba(139, 111, 71, 0.08);
  --shadow-lg: 0 8px 32px rgba(139, 111, 71, 0.12);
  --gold: #C9A84C;
  --sold: #C88770;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== HEADER ===== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 253, 250, 0.92);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  line-height: 1.15;
  flex-shrink: 0;
  min-width: 0;
}

.brand-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 1.4px;
  font-family: "Georgia", "Times New Roman", -apple-system, serif;
  white-space: nowrap;
}

.brand-addr {
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.3px;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-box {
  flex: 1;
  position: relative;
  max-width: 480px;
}

.search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: all .2s;
}

.search-input:focus {
  outline: none;
  border-color: var(--apricot);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(232, 181, 135, 0.15);
}

.search-input::placeholder { color: var(--text-mute); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--wood-soft);
  font-size: 14px;
  pointer-events: none;
}

.cart-btn {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--wood);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}

.cart-btn:hover, .cart-btn:active { background: var(--apricot-soft); transform: scale(1.05); }

.cart-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  background: var(--apricot-deep);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--cream-3);
}

.cart-badge:empty, .cart-badge[data-count="0"] { display: none; }

/* ===== DEMO BANNER ===== */
.demo-banner {
  background: linear-gradient(135deg, rgba(232, 181, 135, 0.15), rgba(201, 168, 76, 0.1));
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  text-align: center;
  font-size: 11px;
  color: var(--wood);
  letter-spacing: 0.5px;
}

.demo-banner strong { color: var(--apricot-deep); }

/* ===== CATEGORY BAR ===== */
.cat-bar-wrap {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 65px;
  z-index: 90;
  backdrop-filter: blur(8px);
  background: rgba(250, 243, 235, 0.9);
}

.cat-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.cat-bar::-webkit-scrollbar { display: none; }

.cat-chip {
  padding: 7px 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  font-family: inherit;
}

.cat-chip:hover { border-color: var(--apricot); color: var(--wood); }

.cat-chip.active {
  background: var(--wood);
  color: var(--cream);
  border-color: var(--wood);
  font-weight: 600;
}

/* ===== MAIN CONTENT ===== */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.result-count {
  font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.result-count strong { color: var(--wood); font-weight: 700; }

/* ===== PRODUCT GRID ===== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

@media (min-width: 640px) {
  .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
}

@media (min-width: 1024px) {
  .product-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
}

/* ===== PRODUCT CARD ===== */
.product-card {
  background: var(--cream-3);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-strong);
}

.product-card:active { transform: translateY(-1px); }

.card-image-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--cream-2);
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1);
  display: block;
}

.product-card:hover .card-image { transform: scale(1.06); }

.card-image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mute);
  font-size: 32px;
  background: linear-gradient(135deg, var(--cream-2), var(--apricot-soft));
}

/* SOLD OUT overlay */
.sold-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(200, 135, 112, 0.95);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 8px;
  letter-spacing: 1px;
  z-index: 2;
}

.product-card.sold-out .card-image { opacity: 0.55; filter: saturate(0.6); }

.card-body {
  padding: 12px 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.card-colors {
  display: flex;
  gap: 4px;
  align-items: center;
  min-height: 14px;
}

.color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(139, 111, 71, 0.2);
  display: inline-block;
}

.card-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}

.card-price {
  font-size: 16px;
  color: var(--wood);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.card-price .currency { font-size: 11px; margin-right: 1px; opacity: 0.7; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-mute);
}

.empty-state .icon { font-size: 44px; margin-bottom: 12px; opacity: 0.5; }

.empty-state h3 { color: var(--text-soft); font-size: 15px; font-weight: 600; margin-bottom: 6px; }

.empty-state p { font-size: 12px; }

/* ===== FOOTER ===== */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 30px 16px 40px;
  margin-top: 40px;
  background: var(--cream-3);
  text-align: center;
}

.footer-inner { max-width: 1280px; margin: 0 auto; }

.footer-brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.footer-tagline {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.footer-contact {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--wood);
  color: var(--cream);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all .2s;
}

.contact-btn:hover { background: var(--apricot-deep); transform: translateY(-1px); }

.footer-copy {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 1px;
}

/* ===== LOADING ===== */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-mute);
  font-size: 13px;
}

.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--apricot-deep);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--wood);
  color: var(--cream);
  padding: 10px 18px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  max-width: 90vw;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MOBILE TWEAKS ===== */
@media (max-width: 480px) {
  .brand-name { font-size: 17px; letter-spacing: 1px; }
  .brand-addr { font-size: 9.5px; margin-top: 2px; }
  .search-input { font-size: 13px; padding: 8px 12px 8px 32px; }
  .search-icon { left: 10px; font-size: 12px; }
  .cart-btn { width: 36px; height: 36px; font-size: 16px; }
  .cat-bar-wrap { top: 61px; }
}

@media (max-width: 380px) {
  .brand-name { font-size: 15px; }
  .brand-addr { font-size: 9px; }
}

/* ============================================================
   ★ M3 商品詳情頁 + 購物車 bottom sheet
   ============================================================ */

/* ===== 頁面切換 ===== */
.page-list.hidden { display: none; }
.detail-page { display: none; max-width: 1280px; margin: 0 auto; padding: 20px 16px 40px; }
.detail-page.active { display: block; }

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px 8px 12px;
  background: var(--cream-3);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--wood);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 18px;
  transition: all .2s;
  font-family: inherit;
}
.detail-back:hover { background: var(--apricot-soft); border-color: var(--apricot); }

/* ===== 詳情頁 layout ===== */
.detail-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 768px) {
  .detail-layout { grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
}
@media (min-width: 1024px) {
  .detail-layout { grid-template-columns: 1.1fr 1fr; }
}

/* ===== 詳情頁圖片 ===== */
.detail-images { display: flex; flex-direction: column; gap: 10px; }

.detail-main-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--cream-2);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}
.detail-main-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

.detail-sold-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(200, 135, 112, 0.95);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 12px;
  letter-spacing: 1.5px;
  z-index: 2;
}

.detail-thumbs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.detail-thumbs::-webkit-scrollbar { display: none; }

.detail-thumb {
  flex-shrink: 0;
  width: 64px;
  height: 64px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  background: var(--cream-2);
  transition: all .15s;
  padding: 0;
}
.detail-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-thumb:hover { border-color: var(--apricot-soft); }
.detail-thumb.active { border-color: var(--apricot-deep); }

/* ===== 詳情頁資訊 ===== */
.detail-info { display: flex; flex-direction: column; gap: 18px; }

.detail-cat {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.detail-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  letter-spacing: 0.5px;
}
.detail-price {
  font-size: 26px;
  font-weight: 800;
  color: var(--wood);
  letter-spacing: 0.5px;
}
.detail-price .currency { font-size: 14px; margin-right: 2px; opacity: 0.7; font-weight: 600; }

.variant-section {
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.variant-label {
  font-size: 12px;
  color: var(--text-soft);
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.variant-label .picked {
  color: var(--wood);
  font-weight: 700;
  margin-left: auto;
  font-size: 13px;
}

.variant-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* 顏色 chip */
.color-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px 6px 6px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
  font-size: 13px;
  color: var(--text-soft);
}
.color-chip:hover { border-color: var(--apricot); }
.color-chip.selected {
  border-color: var(--wood);
  background: var(--wood);
  color: var(--cream);
  font-weight: 600;
}
.color-chip .swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(139, 111, 71, 0.2);
  flex-shrink: 0;
}

/* 尺寸 chip */
.size-chip {
  min-width: 44px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-soft);
  text-align: center;
}
.size-chip:hover { border-color: var(--apricot); }
.size-chip.selected {
  border-color: var(--wood);
  background: var(--wood);
  color: var(--cream);
}

.variant-empty {
  font-size: 12px;
  color: var(--text-mute);
  padding: 6px 0;
}

/* 數量選擇器 */
.qty-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.qty-selector {
  display: inline-flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  background: var(--cream-3);
}
.qty-btn {
  width: 38px;
  height: 40px;
  border: none;
  background: transparent;
  font-size: 18px;
  color: var(--wood);
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.qty-btn:hover { background: var(--apricot-soft); }
.qty-btn:disabled { color: var(--text-mute); cursor: not-allowed; opacity: 0.4; }
.qty-input {
  width: 46px;
  height: 40px;
  border: none;
  background: transparent;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-family: inherit;
  -moz-appearance: textfield;
}
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qty-stock {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.3px;
}

.add-to-cart-btn {
  margin-top: 8px;
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 26px;
  background: var(--wood);
  color: var(--cream);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(139, 111, 71, 0.25);
}
.add-to-cart-btn:hover:not(:disabled) { background: var(--apricot-deep); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212, 151, 104, 0.35); }
.add-to-cart-btn:active { transform: translateY(0); }
.add-to-cart-btn:disabled {
  background: var(--text-mute);
  cursor: not-allowed;
  opacity: 0.5;
  box-shadow: none;
}

/* ===== BOTTOM SHEET (購物車) ===== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(74, 63, 53, 0.4);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1000;
  background: var(--cream);
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  max-height: 88vh;
  box-shadow: 0 -8px 40px rgba(74, 63, 53, 0.18);
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }

@media (min-width: 640px) {
  .sheet {
    left: 50%;
    right: auto;
    bottom: 24px;
    width: 460px;
    transform: translateX(-50%) translateY(calc(100% + 24px));
    border-radius: 20px;
    max-height: 80vh;
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
@media (min-width: 640px) { .sheet-handle { display: none; } }

.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sheet-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 1px;
}
.sheet-title .count { color: var(--apricot-deep); margin-left: 4px; }
.sheet-close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--wood);
  font-size: 20px;
  cursor: pointer;
  border-radius: 50%;
  transition: background .15s;
  display: flex;

//   q_auto:best / good：高品質壓縮
//   f_auto：支援瀏覽器自動用 WebP（更小更清晰）
// ============================================================
function toCloudinaryImage(url, width, quality) {
  if (!url || typeof url !== 'string') return '';
  if (!url.includes('cloudinary.com')) return url;
  // 已經有 transformation 就不重複加
  if (url.match(/\/upload\/[a-z]_[^\/]+\//)) return url;
  return url.replace('/upload/', `/upload/w_${width},c_limit,q_${quality},f_auto/`);
}

async function loadProducts() {
  if (!APPS_SCRIPT_URL) {
    // 還沒接 Apps Script
    allProducts = MOCK_PRODUCTS;
    document.getElementById('demoBanner').style.display = 'block';
    render();
    return;

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=${APPS_SCRIPT_ACTION}`);

    if (data && data.ok && Array.isArray(data.products)) {
      allProducts = data.products;

      render();
    } else {
      throw new Error('回應格式錯誤');

    console.warn('無法載入商品，改用 mock 資料', err);

function getFilteredProducts() {
  let list = allProducts.slice();
  // 只顯示已上架
  list = list.filter(p => p.onlineShop === true);
  // 分類篩選
  if (currentCat && currentCat !== '全部') {
    list = list.filter(p => p.cat === currentCat);
  }
  // 搜尋
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(p => (p.name || '').toLowerCase().includes(q));
  }
  // 排序：有庫存優先、然後價格由低到高
  list.sort((a, b) => {
    const aOut = (a.stock || 0) <= 0 ? 1 : 0;
    const bOut = (b.stock || 0) <= 0 ? 1 : 0;
    if (aOut !== bOut) return aOut - bOut;
    return (a.price || 0) - (b.price || 0);
  });
  return list;
}

// ============================================================
// ★ M3+M4 Hash Routing
// ============================================================
function handleRoute() {
  const hash = location.hash;
  const listEl = document.getElementById('pageList');
  const detailEl = document.getElementById('detailPage');
  const checkoutEl = document.getElementById('checkoutPage');
  const successEl = document.getElementById('successPage');
  const myOrdersEl = document.getElementById('myOrdersPage');

  // 全部隱藏後再顯示指定頁
  listEl.classList.add('hidden');
  detailEl.classList.remove('active');
  checkoutEl.classList.remove('active');
  successEl.classList.remove('active');
  if (myOrdersEl) myOrdersEl.classList.remove('active');

  if (hash.startsWith('#/product/')) {
    const id = decodeURIComponent(hash.substring('#/product/'.length));
    const product = allProducts.find(p => p.id === id);
    if (product && product.onlineShop === true) {
      showDetail(product);
      detailEl.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'instant' });
    } else {
      location.hash = '';
      toast('商品已下架或不存在');
    }
    return;
  }

  if (hash === '#/checkout') {
    // 空車不能結帳
    if (cart.length === 0) {
      location.hash = '';
      toast('購物車是空的');
      return;
    }
    closeCart();
    renderCheckout();
    checkoutEl.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
    return;
  }

  if (hash === '#/order-success' || hash.startsWith('#/order-success/')) {
    // 若 lastOrder 空，嘗試從 URL 拿 orderNo 從 localStorage 恢復
    if (!lastOrder) {
      const parts = hash.split('/');
      const orderNo = decodeURIComponent(parts[parts.length - 1] || '');
      if (orderNo && orderNo !== 'order-success') {
        lastOrder = getOrderLocal(orderNo);
      }
    }
    if (!lastOrder) {
      location.hash = '';
      toast('找不到訂單資料');
      return;
    }
    renderSuccess();
    successEl.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
    // 自動載入訂單訊息（背景執行，不擋 UI）
    setTimeout(() => loadChatMessages(), 100);
    return;
  }

  if (hash === '#/orders') {
    renderMyOrders();
    if (myOrdersEl) myOrdersEl.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
    // ★ 進頁面時背景自動同步（靜默：只有真的有更新才 toast）
    if (getSavedPhone()) autoSyncOrders(true);
    return;
  }

  // 預設：商品列表
  listEl.classList.remove('hidden');
  detailEl.innerHTML = '';
  currentProduct = null;
}

// ★ M3 變體 & 庫存邏輯
// ============================================================
function getVariantStock(product, color, size) {
  if (!product) return 0;
  if (!product.stockMap) return product.stock || 0;
  const key = `${color || ''}|${size || ''}`;
  const n = product.stockMap[key];
  return typeof n === 'number' ? n : 0;
}

function getAvailableColors(product) {
  const colors = product.colors || [];
  const sizes = product.sizes || ['F'];
  if (!product.stockMap) {
    return (product.stock || 0) > 0 ? colors : [];
  }
  return colors.filter(c => sizes.some(s => getVariantStock(product, c, s) > 0));
}

function getAvailableSizes(product, color) {
  const sizes = product.sizes || [];
  if (!product.stockMap) {
    return (product.stock || 0) > 0 ? sizes : [];
  }
  if (color) {
    return sizes.filter(s => getVariantStock(product, color, s) > 0);
  }
  const colors = product.colors || [];
  return sizes.filter(s => colors.some(c => getVariantStock(product, c, s) > 0));
}

function selectColor(color) {
  selectedColor = color;
  // 檢查目前選的 size 在新 color 下是否有貨
  const availSizes = getAvailableSizes(currentProduct, color);
  if (!availSizes.includes(selectedSize)) {
    selectedSize = availSizes[0] || null;
  }
  renderDetail();
}

function selectSize(size) {
  selectedSize = size;
  renderDetail();
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  if (!input) return;
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  let n = parseInt(input.value, 10) || 1;
  n = Math.max(1, Math.min(stock, n + delta));
  input.value = n;
}

function onQtyInput(input) {
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  let n = parseInt(input.value, 10) || 1;
  n = Math.max(1, Math.min(stock, n));
  input.value = n;
}

function handleAddToCart() {
  if (!currentProduct || !selectedColor || !selectedSize) return;
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  if (stock <= 0) { toast('此規格已售完'); return; }
  const qty = parseInt(document.getElementById('qtyInput').value, 10) || 1;
  addToCart(currentProduct, selectedColor, selectedSize, qty);
}

function saveCart() {
  try { localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch (e) {}
  updateCartBadge();
}

function addToCart(product, color, size, qty) {
  const key = `${product.id}|${color}|${size}`;
  const stock = getVariantStock(product, color, size);
  const existing = cart.find(item => item.key === key);
  if (existing) {
    existing.qty = Math.min(stock, existing.qty + qty);
  } else {
    cart.push({
      key,
      productId: product.id,
      name: product.name,
      image: (product.images && product.images[0]) || product.image || '',
      price: product.price || 0,
      color,
      size,
      qty: Math.min(stock, qty),
    });
  }
  saveCart();
  toast(`「${product.name}」已加入購物車 🛒`);
  openCart();
}

function removeFromCart(key) {
  cart = cart.filter(item => item.key !== key);
  saveCart();
  renderCart();
}

function cartChangeQty(key, delta) {
  const item = cart.find(i => i.key === key);
  if (!item) return;
  const p = allProducts.find(x => x.id === item.productId);
  const stock = p ? getVariantStock(p, item.color, item.size) : item.qty;
  item.qty = Math.max(1, Math.min(stock, item.qty + delta));
  saveCart();
  renderCart();
}

function getCartTotal() {
  return cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
}

function getCartCount() {
  return cart.reduce((sum, item) => sum + item.qty, 0);
}

  const m = SHIPPING_METHODS.find(x => x.id === methodId);

  if (subtotal >= FREE_SHIPPING_THRESHOLD && m.fee > 0) return 0;
  return m.fee;
}

  const m = SHIPPING_METHODS.find(x => x.id === methodId);

}

async function submitOrder() {
  // 讀表單
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const birthday = document.getElementById('fBirthday').value.trim();
  const lineId = document.getElementById('fLineId').value.trim();
  const note = document.getElementById('fNote').value.trim();

  // 驗證
  const errors = [];
  if (!name) errors.push('請填寫姓名');
  if (!phone) errors.push('請填寫手機號碼');
  else if (!/^09\d{8}$/.test(phone)) errors.push('手機號碼格式錯誤（需 09 開頭共 10 碼）');
  if (birthday && !/^(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/.test(birthday)) errors.push('生日格式錯誤（需 MM-DD）');

  let cvsBrand = '', cvsCode = '', cvsName = '';
  let postal = '', address = '';
  if (checkoutShipping === 'convenience_store') {
    cvsBrand = document.getElementById('fCvsBrand').value;
    // 新版：只有一個「想寄的門市」自由文字欄位
    const storeEl = document.getElementById('fCvsStore');
    cvsName = storeEl ? storeEl.value.trim() : '';
    cvsCode = ''; // 不再要求店號
  } else if (checkoutShipping === 'post_office') {
    postal = document.getElementById('fPostal').value.trim();
    address = document.getElementById('fAddress').value.trim();
    if (!postal) errors.push('請填寫郵遞區號');
    if (!address) errors.push('請填寫詳細地址');
  }

  if (errors.length > 0) { toast(errors[0]); return; }

  // 訂單物件
  const subtotal = getCartTotal();
  const shippingFee = getShippingFee(checkoutShipping, subtotal);
  const total = subtotal + shippingFee;
  const shippingMeta = SHIPPING_METHODS.find(x => x.id === checkoutShipping) || {};

  const order = {
    createdAt: new Date().toISOString(),
    status: 'unpaid',
    name, phone, birthday, lineId,
    shippingMethod: checkoutShipping,
    shippingLabel: shippingMeta.name || '',
    shippingFee,
    freeShippingApplied: isFreeShippingApplied(checkoutShipping, subtotal),
    cvsBrand, cvsStoreCode: cvsCode, cvsStoreName: cvsName,
    postalCode: postal, address,
    items: cart.map(i => ({
      productId: i.productId, name: i.name, color: i.color, size: i.size,
      price: i.price, qty: i.qty, image: i.image, subtotal: i.price * i.qty,
    })),
    itemCount: getCartCount(),
    subtotal, total, note,
  };

  showLoading('送出訂單中...');

  try {
    if (!APPS_SCRIPT_URL) throw new Error('尚未設定伺服器網址');
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'submitOrder', order }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error(data.error || '送單失敗');

    // 成功
    lastOrder = { ...order, orderNo: data.orderNo };
    saveOrderLocal(lastOrder); // ★ 存本地，之後可回來看
    saveMyPhone(order.phone); // ★ 自動記住電話（識別碼）
    updateMyOrdersBadge(); // ★ 更新 Header 訂單徽章
    cart = [];
    saveCart();
    hideLoading();
    location.hash = '#/order-success/' + encodeURIComponent(data.orderNo);
  } catch (err) {
    hideLoading();
    console.error(err);
    toast('送單失敗：' + (err.message || '未知錯誤') + '，請稍後再試或聯絡 LINE 客服');
  }
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '處理中...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// 訂單送出後補填想寄的門市（不用 LINE，直接呼叫 Apps Script 更新 Sheets）
async function submitStoreUpdate() {
  const nameInput = document.getElementById('sCvsName');
  if (!nameInput) return;
  const name = nameInput.value.trim();
  if (!name) { toast('請填寫想寄的門市'); return; }
  if (!lastOrder) { toast('找不到訂單資料'); return; }

  showLoading('更新訂單資料中...');
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'updateOrderStore',
        orderNo: lastOrder.orderNo,
        cvsStoreCode: '',
        cvsStoreName: name,
      }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '更新失敗');

    // 更新本地資料
    lastOrder.cvsStoreName = name;
    saveOrderLocal(lastOrder);
    hideLoading();
    toast('門市資料已更新 ✓');
    renderSuccess();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    hideLoading();
    console.error(err);
    toast('更新失敗：' + (err.message || '未知錯誤'));
  }
}

// ============================================================
// ★ 訂單客服對話（成功頁）
// ============================================================
let chatMessages = [];

async function loadChatMessages() {
  if (!lastOrder || !lastOrder.orderNo) return;
  const btn = document.getElementById('chatRefreshBtn');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getOrderMessages&orderNo=${encodeURIComponent(lastOrder.orderNo)}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '載入訊息失敗');
    chatMessages = data.messages || [];
    renderChatMessages();
  } catch (err) {
    console.error(err);
    toast('載入訊息失敗：' + err.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function renderChatMessages() {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  if (chatMessages.length === 0) {
    el.innerHTML = '<div class="chat-empty">還沒有訊息<br><span style="font-size:11px;">有問題可以直接在這裡問，老闆會盡快回覆</span></div>';
    return;
  }
  el.innerHTML = chatMessages.map(m => {
    const isCustomer = m.sender === 'customer';
    const time = m.timestampLocal || (m.timestamp ? new Date(m.timestamp).toLocaleString('zh-TW') : '');
    return `
      <div class="chat-msg ${isCustomer ? 'customer' : 'staff'}">
        <div class="chat-msg-wrap">
          <div class="chat-msg-name">${escapeHtml(m.senderName || (isCustomer ? '您' : '老闆'))}</div>
          <div class="chat-bubble">${escapeHtml(m.content || '')}</div>
          <div class="chat-time">${escapeHtml(time)}</div>
        </div>
      </div>
    `;
  }).join('');
  // 自動 scroll 到最新訊息
  el.scrollTop = el.scrollHeight;
}

async function sendChatMessage() {
  if (!lastOrder || !lastOrder.orderNo) { toast('找不到訂單資料'); return; }
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content) return;
  const btn = document.getElementById('chatSendBtn');
  if (btn) { btn.disabled = true; btn.textContent = '送出中...'; }
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addOrderMessage',
        message: {
          orderNo: lastOrder.orderNo,
          sender: 'customer',
          senderName: lastOrder.name || '客戶',
          content: content,
        },
      }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '送出失敗');
    input.value = '';
    await loadChatMessages(); // 送出後重新載入
    toast('訊息已送出 ✓');
  } catch (err) {
    console.error(err);
    toast('送出失敗：' + err.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '送出'; }
  }
}

function renderMyOrders() {
  const el = document.getElementById('myOrdersPage');
  if (!el) return;
  const orders = getAllLocalOrders();
  const savedPhone = getSavedPhone();

  // 已「登入」的狀態列（顯示綁定手機）
  const identitySection = savedPhone ? `
    <div style="background:linear-gradient(135deg,rgba(123,164,123,0.1),rgba(178,212,192,0.06));border:1px solid rgba(123,164,123,0.3);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;color:#4a6b4a;font-weight:700;">✓ 已使用手機號碼</div>
        <div style="font-size:15px;color:var(--text);font-family:'Menlo',monospace;font-weight:700;margin-top:2px;">${maskPhone(savedPhone)}</div>
        <div style="font-size:10px;color:var(--text-mute);margin-top:2px;">此裝置會自動同步這支手機的訂單</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="autoSyncOrders(false)" style="padding:7px 12px;background:var(--wood);color:var(--cream);border:none;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.5px;">
          🔄 同步最新
        </button>
        <button onclick="switchPhone()" style="padding:7px 10px;background:transparent;color:var(--text-mute);border:1px solid var(--border);border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;">
          切換手機
        </button>
      </div>
    </div>
  ` : '';

  // 未「登入」的手機輸入區塊
  const searchSection = !savedPhone ? `
    <div style="background:linear-gradient(135deg,rgba(232,181,135,0.12),rgba(201,168,76,0.06));border:1px dashed var(--border-strong);border-radius:12px;padding:14px 16px;margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;color:var(--wood);margin-bottom:6px;">
        🔍 輸入手機號碼同步訂單
      </div>
      <div style="font-size:11px;color:var(--text-mute);margin-bottom:10px;line-height:1.6;">
        跨裝置查看訂單、繼續對話——輸入下單時的手機號碼
      </div>
      <div style="display:flex;gap:6px;">
        <input type="tel" class="form-input" id="phoneSearchInput" placeholder="0912345678"
               inputmode="numeric" maxlength="10"
               style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;"
               onkeydown="if(event.key==='Enter'){event.preventDefault();searchOrdersByPhone();}">
        <button onclick="searchOrdersByPhone()" id="phoneSearchBtn"
                style="padding:9px 18px;background:var(--wood);color:var(--cream);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;">
          同步
        </button>
      </div>
    </div>
  ` : '';

  if (orders.length === 0) {
    el.innerHTML = `
      <button class="detail-back" onclick="location.hash=''">← 返回商店</button>
      <h1 class="checkout-title">📮 我的訂單</h1>
      ${identitySection}
      ${searchSection}
      <div style="text-align:center;padding:40px 20px;color:var(--text-mute);">
        <div style="font-size:48px;margin-bottom:14px;opacity:0.4;">📮</div>
        <h3 style="color:var(--text-soft);font-size:16px;font-weight:600;margin-bottom:8px;">${savedPhone ? '沒有找到訂單' : '此裝置還沒有訂單'}</h3>
        <p style="font-size:13px;line-height:1.7;">${savedPhone ? '這支手機號碼下還沒有訂單記錄' : '如果曾用其他裝置下單，用上方輸入手機號碼同步訂單'}</p>
      </div>
    `;
    return;
  }
  el.innerHTML = `
    <button class="detail-back" onclick="location.hash=''">← 返回商店</button>
    <h1 class="checkout-title">📮 我的訂單</h1>
    ${identitySection}
    ${searchSection}
    <div style="font-size:12px;color:var(--text-mute);margin-bottom:16px;">
      共 <strong style="color:var(--wood);">${orders.length}</strong> 筆訂單｜點卡片查看詳情、收款碼、對話
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${orders.map(renderMyOrderCard).join('')}
    </div>
  `;
}

// ★ 用手機號碼查詢訂單（跨裝置查詢）
async function searchOrdersByPhone() {
  const input = document.getElementById('phoneSearchInput');
  if (!input) return;
  const phone = input.value.trim().replace(/[^0-9]/g, '');
  if (!phone) { toast('請輸入手機號碼'); return; }
  if (!/^09\d{8}$/.test(phone)) { toast('手機格式錯誤（需 09 開頭 10 碼）'); return; }
  const btn = document.getElementById('phoneSearchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '查詢中...'; btn.style.opacity = '0.6'; }
  showLoading('查詢訂單中...');
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getOrdersByPhone&phone=${encodeURIComponent(phone)}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '查詢失敗');
    const foundOrders = data.orders || [];
    // 存進 localStorage（下次不用再查）
    let newCount = 0;
    foundOrders.forEach(o => {
      if (!getOrderLocal(o.orderNo)) newCount++;
      saveOrderLocal(o);
    });
    // ★ 記住這支電話（之後打開網站自動同步）
    saveMyPhone(phone);
    hideLoading();
    if (foundOrders.length === 0) {
      toast(`此手機號碼下沒有訂單`);
    } else {
      toast(newCount > 0 ? `找到 ${foundOrders.length} 筆訂單，${newCount} 筆新加入 ✓` : `已同步 ${foundOrders.length} 筆訂單`);
    }
    updateMyOrdersBadge();
    renderMyOrders();
  } catch (err) {
    hideLoading();
    console.error(err);
    toast('查詢失敗：' + (err.message || '未知錯誤'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '查詢'; btn.style.opacity = '1'; }
  }
}

// ★ 靜默背景同步（進網站/進我的訂單頁自動呼叫）
async function autoSyncOrders(silent) {
  const phone = getSavedPhone();
  if (!phone) return;
  if (!APPS_SCRIPT_URL) return;
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getOrdersByPhone&phone=${encodeURIComponent(phone)}&_t=${Date.now()}`);
    const data = await res.json();
    if (!data.ok) return;
    const foundOrders = data.orders || [];
    let newCount = 0;
    let statusChanged = 0;
    foundOrders.forEach(o => {
      const existing = getOrderLocal(o.orderNo);
      if (!existing) newCount++;
      else if (existing.status !== o.status) statusChanged++;
      saveOrderLocal(o);
    });
    updateMyOrdersBadge();
    // 如果目前在我的訂單頁，重新 render
    if (location.hash === '#/orders') renderMyOrders();
    if (!silent && (newCount > 0 || statusChanged > 0)) {
      const msgs = [];
      if (newCount > 0) msgs.push(`${newCount} 筆新訂單`);
      if (statusChanged > 0) msgs.push(`${statusChanged} 筆狀態更新`);
      toast('已同步：' + msgs.join('、'));
    }
  } catch (err) {
    console.warn('自動同步失敗（正常，可能沒網路）:', err);
  }
}

// ★ 切換手機號碼（登出當前，讓新電話登入）
function switchPhone() {
  if (!confirm('切換手機號碼後將清除此裝置上的訂單記錄，確定嗎？（雲端訂單資料不會刪除，可用手機號碼再次同步）')) return;
  clearMyPhone();
  try { localStorage.removeItem(ORDERS_KEY); } catch (e) {}
  updateMyOrdersBadge();
  renderMyOrders();
  toast('已清除，請重新輸入手機號碼');
}

function renderMyOrderCard(o) {
  const status = o.status || 'unpaid';
  const label = ORDER_STATUS_LABEL[status] || status;
  const color = ORDER_STATUS_COLOR[status] || '#999';
  const items = Array.isArray(o.items) ? o.items : [];
  const itemCount = items.reduce((s, i) => s + (i.qty || 0), 0);
  const firstImage = (items[0] && items[0].image) || '';
  const timeText = o.createdAt ? new Date(o.createdAt).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
  return `
    <div onclick="location.hash='#/order-success/${encodeURIComponent(o.orderNo)}'"
         style="background:var(--cream-3);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:all .2s;">
      <div style="width:56px;height:56px;border-radius:10px;overflow:hidden;background:var(--cream-2);flex-shrink:0;">
        ${firstImage
          ? `<img src="${thumb(firstImage)}" alt="" style="width:100%;height:100%;object-fit:cover;">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-mute);">📦</div>`
        }
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;">
          <div style="font-family:'Menlo',monospace;font-size:12px;font-weight:700;color:var(--wood);">${escapeHtml(o.orderNo || '')}</div>
          <span style="background:${color};color:#fff;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:0.5px;flex-shrink:0;">${label}</span>
        </div>
        <div style="font-size:12px;color:var(--text-soft);margin-bottom:3px;">
          ${itemCount} 件商品 · NT$${(o.total || 0).toLocaleString()}
        </div>
        <div style="font-size:11px;color:var(--text-mute);">${escapeHtml(timeText)}</div>
      </div>
      <div style="color:var(--text-mute);font-size:16px;flex-shrink:0;">›</div>
    </div>
  `;
}

function copyOrderNo(orderNo) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(orderNo).then(() => toast('訂單編號已複製 ✓'));
  } else {
    const tmp = document.createElement('input');
    tmp.value = orderNo;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    toast('訂單編號已複製 ✓');
  }
}

// ============================================================
// 工具
// ============================================================
function render() {
  renderCatBar();
  renderProducts();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// 搜尋（防抖）
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    // ★ 修 bug：搜尋時如果不在列表頁就切回來
    if (location.hash || document.getElementById('pageList').classList.contains('hidden')) {
      document.getElementById('pageList').classList.remove('hidden');
      ['detailPage', 'checkoutPage', 'successPage', 'myOrdersPage'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
      });
      if (location.hash) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      currentProduct = null;
      render();
    } else {
      renderProducts();
    }
  }, 200);
});

// ★ M3 hash routing 監聽（返回按鈕、瀏覽器前進後退都能觸發）
window.addEventListener('hashchange', handleRoute);

// ★ M3 ESC 關閉購物車 sheet
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCart();
});

// ============================================================
// 啟動
// ============================================================
loadCart();
updateMyOrdersBadge();
loadProducts().then(() => {
  // 商品載入完成後檢查 URL hash（用戶如果直接進入 #/product/xxx）
  if (typeof handleRoute === 'function') handleRoute();
  // ★ 進網站時如果有記住的電話，背景自動同步訂單
  if (getSavedPhone()) {
    setTimeout(() => autoSyncOrders(true), 500);
  }
});
</script>
