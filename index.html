<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF3EB">
<title>萬萬精選 WANWAN SELECTED</title>
<style>
:root {
  --cream: #FAF3EB;
  --cream-2: #F5EBDD;
  --cream-3: #FFFDFA;
  --apricot: #E8B587;
  --apricot-deep: #D49768;
  --apricot-soft: #F2D5B5;
  --wood: #8B6F47;
  --wood-soft: #A68968;
  --text: #4A3F35;
  --text-soft: #7C6E5F;
  --text-mute: #A9998A;
  --border: rgba(139, 111, 71, 0.15);
  --border-strong: rgba(139, 111, 71, 0.28);
  --shadow-sm: 0 1px 4px rgba(139, 111, 71, 0.06);
  --shadow: 0 2px 12px rgba(139, 111, 71, 0.08);
  --shadow-lg: 0 8px 32px rgba(139, 111, 71, 0.12);
  --gold: #C9A84C;
  --sold: #C88770;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== HEADER ===== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 253, 250, 0.92);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + var(--safe-top)) 16px 12px;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  line-height: 1.15;
  flex-shrink: 0;
  min-width: 0;
}

.brand-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 1.4px;
  font-family: "Georgia", "Times New Roman", -apple-system, serif;
  white-space: nowrap;
}

.brand-addr {
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.3px;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-box {
  flex: 1;
  position: relative;
  max-width: 480px;
}

.search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: all .2s;
}

.search-input:focus {
  outline: none;
  border-color: var(--apricot);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(232, 181, 135, 0.15);
}

.search-input::placeholder { color: var(--text-mute); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--wood-soft);
  font-size: 14px;
  pointer-events: none;
}

.cart-btn {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--wood);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}

.cart-btn:hover, .cart-btn:active { background: var(--apricot-soft); transform: scale(1.05); }

.cart-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  background: var(--apricot-deep);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--cream-3);
}

.cart-badge:empty, .cart-badge[data-count="0"] { display: none; }

/* ===== DEMO BANNER ===== */
.demo-banner {
  background: linear-gradient(135deg, rgba(232, 181, 135, 0.15), rgba(201, 168, 76, 0.1));
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  text-align: center;
  font-size: 11px;
  color: var(--wood);
  letter-spacing: 0.5px;
}

.demo-banner strong { color: var(--apricot-deep); }

/* ===== CATEGORY BAR ===== */
.cat-bar-wrap {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 65px;
  z-index: 90;
  backdrop-filter: blur(8px);
  background: rgba(250, 243, 235, 0.9);
}

.cat-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.cat-bar::-webkit-scrollbar { display: none; }

.cat-chip {
  padding: 7px 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--cream-3);
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  font-family: inherit;
}

.cat-chip:hover { border-color: var(--apricot); color: var(--wood); }

.cat-chip.active {
  background: var(--wood);
  color: var(--cream);
  border-color: var(--wood);
  font-weight: 600;
}

/* ===== MAIN CONTENT ===== */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.result-count {
  font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.result-count strong { color: var(--wood); font-weight: 700; }

/* ===== PRODUCT GRID ===== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

@media (min-width: 640px) {
  .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
}

@media (min-width: 1024px) {
  .product-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
}

/* ===== PRODUCT CARD ===== */
.product-card {
  background: var(--cream-3);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-strong);
}

.product-card:active { transform: translateY(-1px); }

.card-image-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--cream-2);
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1);
  display: block;
}

.product-card:hover .card-image { transform: scale(1.06); }

.card-image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mute);
  font-size: 32px;
  background: linear-gradient(135deg, var(--cream-2), var(--apricot-soft));
}

/* SOLD OUT overlay */
.sold-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(200, 135, 112, 0.95);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 8px;
  letter-spacing: 1px;
  z-index: 2;
}

.product-card.sold-out .card-image { opacity: 0.55; filter: saturate(0.6); }

.card-body {
  padding: 12px 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.card-colors {
  display: flex;
  gap: 4px;
  align-items: center;
  min-height: 14px;
}

.color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(139, 111, 71, 0.2);
  display: inline-block;
}

.card-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}

.card-price {
  font-size: 16px;
  color: var(--wood);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.card-price .currency { font-size: 11px; margin-right: 1px; opacity: 0.7; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-mute);
}

.empty-state .icon { font-size: 44px; margin-bottom: 12px; opacity: 0.5; }

.empty-state h3 { color: var(--text-soft); font-size: 15px; font-weight: 600; margin-bottom: 6px; }

.empty-state p { font-size: 12px; }

/* ===== FOOTER ===== */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 30px 16px 40px;
  margin-top: 40px;
  background: var(--cream-3);
  text-align: center;
}

.footer-inner { max-width: 1280px; margin: 0 auto; }

.footer-brand {
  font-size: 16px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.footer-tagline {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.footer-contact {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--wood);
  color: var(--cream);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all .2s;
}

.contact-btn:hover { background: var(--apricot-deep); transform: translateY(-1px); }

.footer-copy {
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 1px;
}

/* ===== LOADING ===== */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-mute);
  font-size: 13px;
}

.spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--apricot-deep);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--wood);
  color: var(--cream);
  padding: 10px 18px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  max-width: 90vw;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MOBILE TWEAKS ===== */
@media (max-width: 480px) {
  .brand-name { font-size: 17px; letter-spacing: 1px; }
  .brand-addr { font-size: 9.5px; margin-top: 2px; }
  .search-input { font-size: 13px; padding: 8px 12px 8px 32px; }
  .search-icon { left: 10px; font-size: 12px; }
  .cart-btn { width: 36px; height: 36px; font-size: 16px; }
  .cat-bar-wrap { top: 61px; }
}

@media (max-width: 380px) {
  .brand-name { font-size: 15px; }
  .brand-addr { font-size: 9px; }
}

/* ============================================================
   ★ M3 商品詳情頁 + 購物車 bottom sheet
   ============================================================ */

/* ===== 頁面切換 ===== */
.page-list.hidden { display: none; }
.detail-page { display: none; max-width: 1280px; margin: 0 auto; padding: 20px 16px 40px; }
.detail-page.active { display: block; }

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px 8px 12px;
  background: var(--cream-3);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--wood);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 18px;
  transition: all .2s;
  font-family: inherit;
}
.detail-back:hover { background: var(--apricot-soft); border-color: var(--apricot); }

/* ===== 詳情頁 layout ===== */
.detail-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 768px) {
  .detail-layout { grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
}
@media (min-width: 1024px) {
  .detail-layout { grid-template-columns: 1.1fr 1fr; }
}

/* ===== 詳情頁圖片 ===== */
.detail-images { display: flex; flex-direction: column; gap: 10px; }

.detail-main-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--cream-2);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}
.detail-main-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

.detail-sold-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(200, 135, 112, 0.95);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 12px;
  letter-spacing: 1.5px;
  z-index: 2;
}

.detail-thumbs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.detail-thumbs::-webkit-scrollbar { display: none; }

.detail-thumb {
  flex-shrink: 0;
  width: 64px;
  height: 64px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  background: var(--cream-2);
  transition: all .15s;
  padding: 0;
}
.detail-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-thumb:hover { border-color: var(--apricot-soft); }
.detail-thumb.active { border-color: var(--apricot-deep); }

/* ===== 詳情頁資訊 ===== */
.detail-info { display: flex; flex-direction: column; gap: 18px; }

.detail-cat {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.detail-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  letter-spacing: 0.5px;
}
.detail-price {
  font-size: 26px;
  font-weight: 800;
  color: var(--wood);
  letter-spacing: 0.5px;
}
.detail-price .currency { font-size: 14px; margin-right: 2px; opacity: 0.7; font-weight: 600; }

.variant-section {
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.variant-label {
  font-size: 12px;
  color: var(--text-soft);
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.variant-label .picked {
  color: var(--wood);
  font-weight: 700;
  margin-left: auto;
  font-size: 13px;
}

.variant-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* 顏色 chip */
.color-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px 6px 6px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
  font-size: 13px;
  color: var(--text-soft);
}
.color-chip:hover { border-color: var(--apricot); }
.color-chip.selected {
  border-color: var(--wood);
  background: var(--wood);
  color: var(--cream);
  font-weight: 600;
}
.color-chip .swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(139, 111, 71, 0.2);
  flex-shrink: 0;
}

/* 尺寸 chip */
.size-chip {
  min-width: 44px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--cream-3);
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-soft);
  text-align: center;
}
.size-chip:hover { border-color: var(--apricot); }
.size-chip.selected {
  border-color: var(--wood);
  background: var(--wood);
  color: var(--cream);
}

.variant-empty {
  font-size: 12px;
  color: var(--text-mute);
  padding: 6px 0;
}

/* 數量選擇器 */
.qty-row { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.qty-selector {
  display: inline-flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  overflow: hidden;
  background: var(--cream-3);
}
.qty-btn {
  width: 38px;
  height: 40px;
  border: none;
  background: transparent;
  font-size: 18px;
  color: var(--wood);
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.qty-btn:hover { background: var(--apricot-soft); }
.qty-btn:disabled { color: var(--text-mute); cursor: not-allowed; opacity: 0.4; }
.qty-input {
  width: 46px;
  height: 40px;
  border: none;
  background: transparent;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-family: inherit;
  -moz-appearance: textfield;
}
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qty-stock {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.3px;
}

.add-to-cart-btn {
  margin-top: 8px;
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 26px;
  background: var(--wood);
  color: var(--cream);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(139, 111, 71, 0.25);
}
.add-to-cart-btn:hover:not(:disabled) { background: var(--apricot-deep); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212, 151, 104, 0.35); }
.add-to-cart-btn:active { transform: translateY(0); }
.add-to-cart-btn:disabled {
  background: var(--text-mute);
  cursor: not-allowed;
  opacity: 0.5;
  box-shadow: none;
}

/* ===== BOTTOM SHEET (購物車) ===== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(74, 63, 53, 0.4);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1000;
  background: var(--cream);
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
  max-height: 88vh;
  box-shadow: 0 -8px 40px rgba(74, 63, 53, 0.18);
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }

@media (min-width: 640px) {
  .sheet {
    left: 50%;
    right: auto;
    bottom: 24px;
    width: 460px;
    transform: translateX(-50%) translateY(calc(100% + 24px));
    border-radius: 20px;
    max-height: 80vh;
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
@media (min-width: 640px) { .sheet-handle { display: none; } }

.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sheet-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--wood);
  letter-spacing: 1px;
}
.sheet-title .count { color: var(--apricot-deep); margin-left: 4px; }
.sheet-close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--wood);
  font-size: 20px;
  cursor: pointer;
  border-radius: 50%;

//   q_auto:best / good：高品質壓縮
//   f_auto：支援瀏覽器自動用 WebP（更小更清晰）
// ============================================================
function toCloudinaryImage(url, width, quality) {
  if (!url || typeof url !== 'string') return '';
  if (!url.includes('cloudinary.com')) return url;
  // 已經有 transformation 就不重複加
  if (url.match(/\/upload\/[a-z]_[^\/]+\//)) return url;
  return url.replace('/upload/', `/upload/w_${width},c_limit,q_${quality},f_auto/`);
}

// 列表縮圖：600px（未來原檔高清時剛好；現況原檔 450 會直接送 450）

    if (data && data.ok && Array.isArray(data.products)) {
      allProducts = data.products;

    allProducts = MOCK_PRODUCTS;

function getFilteredProducts() {
  let list = allProducts.slice();
  // 只顯示已上架
  list = list.filter(p => p.onlineShop === true);
  // 分類篩選
  if (currentCat && currentCat !== '全部') {
    list = list.filter(p => p.cat === currentCat);
  }
  // 搜尋
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(p => (p.name || '').toLowerCase().includes(q));
  }
  // 排序：有庫存優先、然後價格由低到高
  list.sort((a, b) => {
    const aOut = (a.stock || 0) <= 0 ? 1 : 0;
    const bOut = (b.stock || 0) <= 0 ? 1 : 0;
    if (aOut !== bOut) return aOut - bOut;
    return (a.price || 0) - (b.price || 0);
  });
  return list;
}

function handleRoute() {
  const hash = location.hash;
  const listEl = document.getElementById('pageList');
  const detailEl = document.getElementById('detailPage');
  const checkoutEl = document.getElementById('checkoutPage');
  const successEl = document.getElementById('successPage');

  listEl.classList.add('hidden');
  detailEl.classList.remove('active');
  checkoutEl.classList.remove('active');
  successEl.classList.remove('active');

  if (hash.startsWith('#/product/')) {
    const id = decodeURIComponent(hash.substring('#/product/'.length));
    const product = allProducts.find(p => p.id === id);
    if (product && product.onlineShop === true) {
      showDetail(product);

      window.scrollTo({ top: 0, behavior: 'instant' });
    } else {
      location.hash = '';

    // 空車不能結帳

      return;
    }
    closeCart();
    renderCheckout();
    checkoutEl.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });

  if (hash === '#/order-success' || hash.startsWith('#/order-success/')) {

      return;

// ============================================================
// ★ M3 變體 & 庫存邏輯
// ============================================================
function getVariantStock(product, color, size) {
  if (!product) return 0;
  if (!product.stockMap) return product.stock || 0;
  const key = `${color || ''}|${size || ''}`;
  const n = product.stockMap[key];
  return typeof n === 'number' ? n : 0;
}

function getAvailableColors(product) {
  const colors = product.colors || [];
  const sizes = product.sizes || ['F'];
  if (!product.stockMap) {
    return (product.stock || 0) > 0 ? colors : [];
  }
  return colors.filter(c => sizes.some(s => getVariantStock(product, c, s) > 0));
}

function getAvailableSizes(product, color) {
  const sizes = product.sizes || [];
  if (!product.stockMap) {
    return (product.stock || 0) > 0 ? sizes : [];
  }
  if (color) {
    return sizes.filter(s => getVariantStock(product, color, s) > 0);
  }
  const colors = product.colors || [];
  return sizes.filter(s => colors.some(c => getVariantStock(product, c, s) > 0));
}

// ★ M3 詳情頁互動
// ============================================================
function selectImage(idx) {
  selectedImageIdx = idx;
  renderDetail();
}

function selectColor(color) {
  selectedColor = color;
  // 檢查目前選的 size 在新 color 下是否有貨
  const availSizes = getAvailableSizes(currentProduct, color);
  if (!availSizes.includes(selectedSize)) {
    selectedSize = availSizes[0] || null;
  }
  renderDetail();
}

function selectSize(size) {
  selectedSize = size;
  renderDetail();
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  if (!input) return;
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  let n = parseInt(input.value, 10) || 1;
  n = Math.max(1, Math.min(stock, n + delta));
  input.value = n;
}

function onQtyInput(input) {
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  let n = parseInt(input.value, 10) || 1;
  n = Math.max(1, Math.min(stock, n));
  input.value = n;
}

function handleAddToCart() {
  if (!currentProduct || !selectedColor || !selectedSize) return;
  const stock = getVariantStock(currentProduct, selectedColor, selectedSize);
  if (stock <= 0) { toast('此規格已售完'); return; }
  const qty = parseInt(document.getElementById('qtyInput').value, 10) || 1;
  addToCart(currentProduct, selectedColor, selectedSize, qty);
}

// ============================================================
// ★ M3 購物車 CRUD
// ============================================================
const CART_KEY = 'wanwan_shop_cart';

function loadCart() {
  try {
    const raw = localStorage.getItem(CART_KEY);
    cart = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(cart)) cart = [];
  } catch (e) { cart = []; }
  updateCartBadge();
}

function saveCart() {
  try { localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch (e) {}
  updateCartBadge();
}

function addToCart(product, color, size, qty) {
  const key = `${product.id}|${color}|${size}`;
  const stock = getVariantStock(product, color, size);
  const existing = cart.find(item => item.key === key);
  if (existing) {
    existing.qty = Math.min(stock, existing.qty + qty);
  } else {
    cart.push({
      key,
      productId: product.id,
      name: product.name,
      image: (product.images && product.images[0]) || product.image || '',
      price: product.price || 0,
      color,
      size,
      qty: Math.min(stock, qty),
    });
  }
  saveCart();
  toast(`「${product.name}」已加入購物車 🛒`);
  openCart();
}

function removeFromCart(key) {
  cart = cart.filter(item => item.key !== key);
  saveCart();
  renderCart();
}

function cartChangeQty(key, delta) {
  const item = cart.find(i => i.key === key);
  if (!item) return;
  const p = allProducts.find(x => x.id === item.productId);
  const stock = p ? getVariantStock(p, item.color, item.size) : item.qty;
  item.qty = Math.max(1, Math.min(stock, item.qty + delta));
  saveCart();
  renderCart();
}

function getCartTotal() {
  return cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
}

function getCartCount() {
  return cart.reduce((sum, item) => sum + item.qty, 0);
}

function updateCartBadge() {
  const badge = document.getElementById('cartBadge');
  const count = getCartCount();
  badge.textContent = count > 0 ? count : '';
  badge.setAttribute('data-count', count);
}

function renderCart() {
  const body = document.getElementById('cartBody');
  const titleCount = document.getElementById('cartTitleCount');
  const totalEl = document.getElementById('cartTotalAmount');
  const checkoutBtn = document.getElementById('checkoutBtn');

  const count = getCartCount();
  titleCount.textContent = count > 0 ? ` (${count})` : '';

  if (cart.length === 0) {
    body.innerHTML = `
      <div class="cart-empty">
        <div class="icon">🛒</div>
        <p>購物車還是空的<br>快去挑選喜歡的商品吧！</p>
      </div>`;
    totalEl.textContent = '0';
    checkoutBtn.disabled = true;
    return;
  }

  checkoutBtn.disabled = false;

  // ★ M4 免運進度條
  const subtotal = getCartTotal();
  const gap = FREE_SHIPPING_THRESHOLD - subtotal;
  const percent = Math.min(100, Math.round((subtotal / FREE_SHIPPING_THRESHOLD) * 100));
  const freeShipHtml = gap <= 0
    ? `<div class="free-shipping-bar reached">
         🎉 已達免運門檻！<strong>寄送免運費</strong>
         <div class="fsb-progress"><div class="fsb-fill" style="width:100%"></div></div>
       </div>`
    : `<div class="free-shipping-bar">
         再買 <strong>NT$${gap.toLocaleString()}</strong> 即可免運（滿 $${FREE_SHIPPING_THRESHOLD.toLocaleString()}）
         <div class="fsb-progress"><div class="fsb-fill" style="width:${percent}%"></div></div>
       </div>`;

  body.innerHTML = freeShipHtml + cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">
        ${item.image
          ? `<img src="${thumb(item.image)}" alt="${escapeAttr(item.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'cart-item-placeholder\\'>👗</div>'">`
          : `<div class="cart-item-placeholder">👗</div>`
        }
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(item.name)}</div>
        <div class="cart-item-variant">${escapeHtml(item.color)} / ${escapeHtml(item.size)}</div>
        <div class="cart-item-price">NT$${(item.price * item.qty).toLocaleString()}</div>
      </div>
      <div class="cart-item-side">
        <button class="cart-item-remove" onclick="removeFromCart('${escapeAttr(item.key)}')" title="移除">✕</button>
        <div class="cart-item-qty">
          <button class="cart-qty-btn" onclick="cartChangeQty('${escapeAttr(item.key)}', -1)">−</button>
          <span class="cart-qty-num">${item.qty}</span>
          <button class="cart-qty-btn" onclick="cartChangeQty('${escapeAttr(item.key)}', 1)">+</button>
        </div>
      </div>
    </div>
  `).join('');

  totalEl.textContent = getCartTotal().toLocaleString();
}

// ★ M4 結帳頁

function getShippingFee(methodId, subtotal) {
  const m = SHIPPING_METHODS.find(x => x.id === methodId);
  if (!m) return 0;
  // 免運：門檻達到 且 非到店自取以外的方式（自取本來就 $0）
  if (subtotal >= FREE_SHIPPING_THRESHOLD && m.fee > 0) return 0;
  return m.fee;
}

function isFreeShippingApplied(methodId, subtotal) {
  const m = SHIPPING_METHODS.find(x => x.id === methodId);
  if (!m || m.fee === 0) return false;
  return subtotal >= FREE_SHIPPING_THRESHOLD;
}

function renderShippingOptions() {
  const subtotal = getCartTotal();
  const wrap = document.getElementById('shippingOptions');

    const displayFee = isFree ? 'FREE' : (m.fee === 0 ? '免費' : `NT$${m.fee}`);
    const selected = m.id === checkoutShipping;
    return `
      <label class="shipping-option ${selected ? 'selected' : ''}" onclick="setShipping('${m.id}')">
        <input type="radio" name="shipping" ${selected ? 'checked' : ''}>
        <div class="shipping-option-body">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span class="shipping-option-name">${escapeHtml(m.name)}</span>
            <span class="shipping-option-fee ${isFree || m.fee === 0 ? 'free' : ''}">${displayFee}</span>
          </div>
          <div class="shipping-option-desc">${escapeHtml(m.desc)}</div>
        </div>
      </label>
    `;
  }).join('');
  renderShippingExtra();
}

function setShipping(id) {

function updateCheckoutTotals() {
  const subtotal = getCartTotal();
  const fee = getShippingFee(checkoutShipping, subtotal);
  const isFree = isFreeShippingApplied(checkoutShipping, subtotal);
  const total = subtotal + fee;
  const feeHtml = isFree
    ? `<span class="free-tag">已享免運 🎉</span>`
    : (fee === 0 ? `免費` : `NT$${fee.toLocaleString()}`);
  document.getElementById('summaryTotals').innerHTML = `
    <div class="summary-total-row"><span>商品小計</span><span>NT$${subtotal.toLocaleString()}</span></div>
    <div class="summary-total-row"><span>運費</span><span>${feeHtml}</span></div>
    <div class="summary-total-row grand"><span>總計</span><span class="amount">NT$${total.toLocaleString()}</span></div>
  `;
}

// ============================================================
// ★ M4 送單
// ============================================================
async function submitOrder() {
  // 讀表單
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const birthday = document.getElementById('fBirthday').value.trim();
  const note = document.getElementById('fNote').value.trim();

  // 驗證
  const errors = [];
  if (!name) errors.push('請填寫姓名');
  if (!phone) errors.push('請填寫手機號碼');
  else if (!/^09\d{8}$/.test(phone)) errors.push('手機號碼格式錯誤（需 09 開頭共 10 碼）');
  if (birthday && !/^(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/.test(birthday)) errors.push('生日格式錯誤（需 MM-DD）');

  let cvsBrand = '', cvsCode = '', cvsName = '';
  let postal = '', address = '';
  if (checkoutShipping === 'convenience_store') {
    cvsBrand = document.getElementById('fCvsBrand').value;
    cvsCode = document.getElementById('fCvsCode').value.trim();
    cvsName = document.getElementById('fCvsName').value.trim();
    if (!cvsCode) errors.push('請填寫超商店號');
    if (!cvsName) errors.push('請填寫超商店名');
  } else if (checkoutShipping === 'post_office') {
    postal = document.getElementById('fPostal').value.trim();
    address = document.getElementById('fAddress').value.trim();
    if (!postal) errors.push('請填寫郵遞區號');
    if (!address) errors.push('請填寫詳細地址');
  }

  if (errors.length > 0) { toast(errors[0]); return; }

  // 訂單物件
  const subtotal = getCartTotal();
  const shippingFee = getShippingFee(checkoutShipping, subtotal);
  const total = subtotal + shippingFee;
  const shippingMeta = SHIPPING_METHODS.find(x => x.id === checkoutShipping) || {};

  const order = {
    createdAt: new Date().toISOString(),
    status: 'unpaid',
    name, phone, birthday,
    shippingMethod: checkoutShipping,
    shippingLabel: shippingMeta.name || '',
    shippingFee,
    freeShippingApplied: isFreeShippingApplied(checkoutShipping, subtotal),
    cvsBrand, cvsStoreCode: cvsCode, cvsStoreName: cvsName,
    postalCode: postal, address,
    items: cart.map(i => ({
      productId: i.productId, name: i.name, color: i.color, size: i.size,
      price: i.price, qty: i.qty, image: i.image, subtotal: i.price * i.qty,
    })),
    itemCount: getCartCount(),
    subtotal, total, note,
  };

  showLoading('送出訂單中...');

  try {
    if (!APPS_SCRIPT_URL) throw new Error('尚未設定伺服器網址');
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'submitOrder', order }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    });
    const data = await res.json();
    if (!data || !data.ok) throw new Error(data.error || '送單失敗');

    // 成功
    lastOrder = { ...order, orderNo: data.orderNo };
    cart = [];
    saveCart();
    hideLoading();
    location.hash = '#/order-success/' + encodeURIComponent(data.orderNo);
  } catch (err) {
    hideLoading();
    console.error(err);
    toast('送單失敗：' + (err.message || '未知錯誤') + '，請稍後再試或聯絡 LINE 客服');
  }
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '處理中...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function copyOrderNo(orderNo) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(orderNo).then(() => toast('訂單編號已複製 ✓'));
  } else {
    const tmp = document.createElement('input');
    tmp.value = orderNo;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    toast('訂單編號已複製 ✓');
  }
}

// ============================================================
// 工具
// ============================================================
function render() {
  renderCatBar();
  renderProducts();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function escapeAttr(s) { return escapeHtml(s); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// 搜尋（防抖）
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    renderProducts();
  }, 200);
});

loadCart();
loadProducts().then(() => {

  if (typeof handleRoute === 'function') handleRoute();
});
